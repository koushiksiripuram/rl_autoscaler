apiVersion: v1
kind: ServiceAccount
metadata:
  name: autoscaler-sa

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: autoscaler-role
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get","list","watch","patch"]

- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get","list"]

- apiGroups: ["metrics.k8s.io"]
  resources: ["pods"]
  verbs: ["get","list"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: autoscaler-binding
subjects:
- kind: ServiceAccount
  name: autoscaler-sa
  namespace: default
roleRef:
  kind: ClusterRole
  name: autoscaler-role
  apiGroup: rbac.authorization.k8s.io
