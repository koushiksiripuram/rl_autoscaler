apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  default.conf: |
    server {
      listen 80;
      #location / {
       #  root /usr/share/nginx/html;
      #}


        location / {
            add_header Content-Type text/plain;
            return 200 "Served by pod: $hostname\n";
        }

      location /stub_status {
        stub_status;
        allow 127.0.0.1;
        deny all;
      }
    }

